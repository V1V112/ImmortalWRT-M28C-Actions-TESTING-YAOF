name: 编译 ImmortalWrt M28C 固件（支持私人配置仓库）

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: "选择 ImmortalWrt 版本"
        required: true
        default: "openwrt-25.12"
        type: choice
        options:
          - master
          - v25.12.0-rc2

      custom_ref:
        description: "自定义 ImmortalWrt 分支或标签；只有选择 custom 时才需要填写"
        required: false
        default: ""
        type: string

      profile:
        description: "编译配置方案"
        required: true
        default: "m28c"
        type: choice
        options:
          - m28c

      custom_config_repo:
        description: "私人 OpenWrt 配置仓库 URL；留空则只使用本地 files"
        required: false
        type: string
        default: ""

      custom_config_branch:
        description: "配置仓库分支、标签或可拉取引用"
        required: false
        type: string
        default: "main"

      custom_config_required:
        description: "私人配置仓库拉取失败时是否直接终止构建"
        required: true
        default: false
        type: boolean

      extra_feeds:
        description: "可选：额外 feeds 源，每行一个 src-git 配置"
        required: false
        type: string

      extra_packages:
        description: "可选：额外软件包名称。前面加 - 表示禁用某个软件包"
        required: false
        type: string

      extra_config:
        description: "可选：追加到 profile 配置之后的原始 .config 配置行"
        required: false
        type: string

      upload_packages:
        description: "是否把 bin/packages 目录也作为构建产物上传"
        required: true
        default: false
        type: boolean

      verbose_fallback:
        description: "编译失败后是否使用 make -j1 V=s 重新尝试并输出详细日志"
        required: true
        default: true
        type: boolean

      enable_bbrv3:
        description: "启用内置 BBRv3 补丁；禁用则使用 ImmortalWrt 默认的 BBR v1"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/build-immortalwrt.yml
    with:
      immortalwrt_version: ${{ inputs.immortalwrt_version }}
      custom_ref: ${{ inputs.custom_ref }}
      profile: ${{ inputs.profile }}
      custom_config_repo: ${{ inputs.custom_config_repo }}
      custom_config_branch: ${{ inputs.custom_config_branch }}
      custom_config_required: ${{ inputs.custom_config_required }}
      extra_feeds: ${{ inputs.extra_feeds }}
      extra_packages: ${{ inputs.extra_packages }}
      extra_config: ${{ inputs.extra_config }}
      upload_packages: ${{ inputs.upload_packages }}
      verbose_fallback: ${{ inputs.verbose_fallback }}
      enable_bbrv3: ${{ inputs.enable_bbrv3 }}
    secrets:
      CUSTOM_CONFIG_TOKEN: ${{ secrets.CUSTOM_CONFIG_TOKEN }}
